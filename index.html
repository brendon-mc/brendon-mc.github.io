    <script type="text/javascript">

        (function () {
            // ----- Helper: Read cookie -----
            function getCookie(name) {
                const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
                return match ? decodeURIComponent(match[2]) : null;
            }

            // ----- Helper: Set cookie -----
            function setCookie(name, value, minutes) {
                const expires = new Date(Date.now() + minutes * 60 * 1000).toUTCString();
                document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/; SameSite=Lax`;
            }

            // ----- Wait for DY values to exist -----
            function waitForDY(callback) {
                if (window.DY && DY.session && DY.jsession) {
                    callback();
                } else {
                    setTimeout(() => waitForDY(callback), 50);
                }
            }

            waitForDY(() => {
                const dySession = DY.session;
                const dyJSession = DY.jsession;

                const cookieSession = getCookie("_dysession");
                const cookieJSession = getCookie("_dyjsession");

                const hasValidExistingCookies =
                    cookieSession === dySession &&
                    cookieJSession === dyJSession;

                if (hasValidExistingCookies) {
                    // ✅ Refresh expiration by 30 minutes
                    setCookie("_dysession", dySession, 30);
                    setCookie("_dyjsession", dyJSession, 30);
                } else {
                    // ✅ Set new values
                    setCookie("_dysession", dySession, 30);
                    setCookie("_dyjsession", dyJSession, 30);
                }
            });
        })();

        // DY1

        window.DY = window.DY || {};

        DY.recommendationContext =
        {
            type: "HOMEPAGE", data: []
        };
        //     //type: "PRODUCT", data:["1217241-100"]
        // };

        if (document.location.href.indexOf('cookieFalse') > -1) {
            DY.userActiveConsent = { accepted: false }
        } else {
            DY.userActiveConsent = { accepted: true }
        }
